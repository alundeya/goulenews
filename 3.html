<p>空铭的欲望非常强大，仅仅因为他爸不管他跳钢管舞，他就把他爸绑架并调教，让他爸去青楼卖钩子。</p>
<p>事出有因！我们都说子不教父之过，他的父亲在他小的时候把空铭打了一顿，导致空铭怀恨在心</p>
